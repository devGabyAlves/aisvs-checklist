<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controles AISVS em Portugues</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="header-top">
          <h1 id="pageTitle">Controles OWASP AISVS</h1>
          <div class="top-actions">
            <label for="languageSelect" class="language-label" id="languageLabel">Idioma</label>
            <select id="languageSelect" aria-label="Selecionar idioma">
              <option value="pt">PT</option>
              <option value="en">EN</option>
            </select>
            <button id="themeToggle" type="button" aria-label="Alternar tema">Modo escuro</button>
          </div>
        </div>
      </header>

      <section class="stats" id="stats">
        <article class="stat-card">
          <h2 id="totalLabel">Total</h2>
          <strong id="totalCount">-</strong>
        </article>
        <article class="stat-card">
          <h2 id="level1Label">Nível 1</h2>
          <strong id="l1Count">-</strong>
        </article>
        <article class="stat-card">
          <h2 id="level2Label">Nível 2</h2>
          <strong id="l2Count">-</strong>
        </article>
        <article class="stat-card">
          <h2 id="level3Label">Nível 3</h2>
          <strong id="l3Count">-</strong>
        </article>
        <article class="stat-card">
          <h2 id="implementedLabel">Implementados</h2>
          <strong id="implementedCount">-</strong>
        </article>
        <article class="stat-card">
          <h2 id="pendingLabel">Pendentes</h2>
          <strong id="pendingCount">-</strong>
        </article>
      </section>

      <section class="filters">
        <div class="level-buttons" id="levelButtons">
          <button data-level="all" class="active" id="btnAll">Todos</button>
          <button data-level="1" id="btnL1">Nível 1</button>
          <button data-level="2" id="btnL2">Nível 2</button>
          <button data-level="3" id="btnL3">Nível 3</button>
        </div>

        <label id="searchLabel">
          Buscar controle
          <input
            id="searchInput"
            type="search"
            placeholder="Ex.: autenticacao, injeção de prompt, C9.4..."
          />
        </label>

        <label id="chapterLabel">
          Capítulo
          <select id="chapterSelect">
            <option value="all" id="allChaptersOption">Todos os capítulos</option>
          </select>
        </label>
      </section>

      <section class="status">
        <p id="statusText">Carregando controles oficiais do AISVS...</p>
      </section>

      <section class="results">
        <table>
          <thead>
            <tr>
              <th id="thChecklist">Checklist</th>
              <th>ID</th>
              <th id="thLevel">Nível</th>
              <th id="thChapter">Capítulo</th>
              <th id="thSection">Seção</th>
              <th id="thControl">Controle</th>
            </tr>
          </thead>
          <tbody id="controlsTableBody"></tbody>
        </table>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
